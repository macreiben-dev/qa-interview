<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Password Kata</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f5f7;
      margin: 0;
      padding: 40px 16px;
    }
    .card {
      max-width: 420px;
      margin: 0 auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.1);
      padding: 32px;
    }
    h1 { font-size: 1.4rem; margin: 0 0 24px; color: #1a1a1a; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: .85rem; font-weight: 600; color: #444; margin-bottom: 4px; }
    input {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: .95rem;
    }
    input.ng-invalid.ng-touched { border-color: #d73a3a; }
    input.ng-valid.ng-touched  { border-color: #2e7d32; }
    .error { color: #d73a3a; font-size: .8rem; margin-top: 4px; }
    .rules { font-size: .78rem; color: #666; margin: 4px 0 0; line-height: 1.5; }
    .strength {
      font-size: .78rem;
      font-weight: 600;
      margin-top: 4px;
    }
    .strength.weak   { color: #d73a3a; }
    .strength.medium { color: #e67e22; }
    .strength.strong { color: #2e7d32; }
    button[type=submit] {
      width: 100%;
      padding: 10px;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }
    button[type=submit]:disabled { background: #9e9e9e; cursor: not-allowed; }
    .success { color: #2e7d32; font-weight: 600; margin-top: 16px; text-align: center; }
    .api-error { color: #d73a3a; margin-top: 16px; font-size: .85rem; }
    .api-error ul { margin: 4px 0; padding-left: 20px; }
  </style>
</head>
<body>
  <app-root></app-root>
</body>
</html>
